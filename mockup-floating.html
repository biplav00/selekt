<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Selekt — Floating Widget</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

  body {
    font-family: system-ui;
    background: #0e0e18;
    background-image:
      radial-gradient(ellipse at 30% 20%, rgba(59,130,246,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(139,92,246,0.04) 0%, transparent 50%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 80px;
    margin: 0;
    padding: 40px;
  }

  .col { display: flex; flex-direction: column; align-items: center; }

  .label {
    color: #555;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 16px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ============================================================
     WIDGET — 3-column CSS Grid
     [pick-icon]  [input / controls]  [action buttons]
     ============================================================ */
  .widget {
    width: 400px;
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    transition: box-shadow 0.3s, border-color 0.3s;
  }
  .widget:hover {
    border-color: rgba(59,130,246,0.2) !important;
  }

  /* ── Pick button (left) ── */
  .pick-btn {
    padding: 0 12px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #3b82f6;
    color: #fff;
    transition: background 0.2s, transform 0.1s;
    border-radius: 0;
    position: relative;
    overflow: hidden;
  }
  .pick-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 60%);
    pointer-events: none;
  }
  .pick-btn:hover { background: #2563eb; }
  .pick-btn:active { transform: scale(0.96); }
  .pick-btn.picking { background: #7c3aed; }
  .pick-btn svg {
    width: 20px; height: 20px;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
    position: relative; z-index: 1;
  }

  /* ── Actions column (right) ── */
  .actions-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    padding: 4px 4px;
    align-self: stretch;
    overflow: hidden;
  }

  .icon-btn {
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    padding: 0;
    transition: all 0.15s;
  }
  .icon-btn:active { transform: scale(0.9); }
  .icon-btn svg { width: 12px; height: 12px; }

  /* ── Center column ── */
  .center-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 10px;
    gap: 8px;
    min-width: 0;
  }

  .locator-input {
    padding: 7px 10px;
    border-radius: 7px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .locator-input:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1), 0 0 12px rgba(59,130,246,0.06);
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .format-select {
    padding: 4px 8px;
    border-radius: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    cursor: pointer;
    outline: none;
    letter-spacing: 0.04em;
    transition: border-color 0.15s;
  }
  .format-select:focus { border-color: #3b82f6; }

  .match-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 9px;
    border-radius: 10px;
    transition: all 0.25s;
  }

  .spacer { flex: 1; }

  .copy-btn {
    padding: 4px 12px;
    border-radius: 5px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
  }
  .copy-btn:active { transform: scale(0.95); }

  /* ============================================================
     DARK THEME
     ============================================================ */
  .dark .widget {
    background: #0a0a0f;
    border: none;
    box-shadow:
      0 0 0 1px rgba(59,130,246,0.04),
      0 24px 64px rgba(0,0,0,0.6),
      0 4px 12px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.02);
  }
  .dark .widget:hover {
    box-shadow:
      0 0 0 1px rgba(59,130,246,0.1),
      0 24px 64px rgba(0,0,0,0.6),
      0 4px 12px rgba(0,0,0,0.4),
      inset 0 1px 0 rgba(255,255,255,0.03);
  }
  .dark .actions-col {
    background: linear-gradient(180deg, #0e0e14 0%, #0c0c10 100%);
  }
  .dark .icon-btn { background: transparent; color: #444; }
  .dark .icon-btn:hover { background: rgba(255,255,255,0.04); color: #888; }

  .dark .center-col { background: #0a0a0f; }
  .dark .locator-input {
    background: #060609;
    border: 1px solid #1a1a24;
    color: #d4d4dc;
    caret-color: #3b82f6;
  }
  .dark .locator-input::placeholder { color: #333340; font-style: italic; }

  .dark .format-select {
    background: #0e0e14; border: 1px solid #1a1a24; color: #888;
  }
  .dark .match-pill {
    background: rgba(34,197,94,0.06); color: #22c55e;
    border: 1px solid rgba(34,197,94,0.15);
    box-shadow: 0 0 8px rgba(34,197,94,0.06);
  }
  .dark .match-pill.none {
    background: rgba(239,68,68,0.05); color: #ef4444;
    border-color: rgba(239,68,68,0.15);
    box-shadow: 0 0 8px rgba(239,68,68,0.04);
  }
  .dark .copy-btn { background: #0e0e14; color: #666; }
  .dark .copy-btn:hover { background: #16161e; color: #ccc; }

  /* ============================================================
     LIGHT THEME
     ============================================================ */
  .light .widget {
    background: #fefefe;
    border: none;
    box-shadow:
      0 0 0 1px #cdcdd4,
      0 24px 64px rgba(0,0,0,0.08),
      0 4px 12px rgba(0,0,0,0.05),
      0 1px 3px rgba(0,0,0,0.06);
  }
  .light .widget:hover {
    box-shadow:
      0 24px 64px rgba(0,0,0,0.1),
      0 4px 12px rgba(0,0,0,0.06),
      0 1px 3px rgba(0,0,0,0.06);
  }
  .light .actions-col {
    background: #f5f5f8;
  }
  .light .icon-btn { background: transparent; color: #aaa; }
  .light .icon-btn:hover { background: rgba(0,0,0,0.05); color: #555; }

  .light .center-col { background: #fefefe; }
  .light .locator-input {
    background: #fefefe;
    border: 1px solid #d4d4da;
    color: #1a1a20;
    caret-color: #2563eb;
  }
  .light .controls-row {
    background: #fefefe;
  }
  .light .locator-input::placeholder { color: #aaa; font-style: italic; }

  .light .format-select {
    background: #ececf0; border: 1px solid #d4d4da; color: #555;
  }
  .light .match-pill {
    background: rgba(22,163,106,0.07); color: #15803d;
    border: 1px solid rgba(22,163,106,0.18);
  }
  .light .match-pill.none {
    background: rgba(220,38,38,0.05); color: #dc2626;
    border-color: rgba(220,38,38,0.12);
  }
  .light .copy-btn { background: #ececf0; color: #555; }
  .light .copy-btn:hover { background: #dddde2; color: #1a1a20; }
</style>
</head>
<body>

<!-- DARK -->
<div class="col dark">
  <div class="label">Dark</div>
  <div class="widget">
    <button class="pick-btn">
      <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/><path d="M8 1v2.5M8 12.5V15M1 8h2.5M12.5 8H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <div class="center-col">
      <input type="text" class="locator-input" placeholder="type or pick a selector…" value="page.getByRole('button')" />
      <div class="controls-row">
      <select class="format-select">
        <option>PW</option><option>CSS</option><option>XPath</option><option>CY</option><option>SE</option>
      </select>
      <span class="match-pill">4</span>
      <span class="spacer"></span>
      <button class="copy-btn">Copy</button>
      </div>
    </div>
    <div class="actions-col">
      <button class="icon-btn" title="Open sidepanel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
      <button class="icon-btn" title="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="icon-btn" title="Close">
        <svg viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- LIGHT -->
<div class="col light">
  <div class="label">Light</div>
  <div class="widget">
    <button class="pick-btn">
      <svg viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="5.5" stroke="currentColor" stroke-width="1.5"/><circle cx="8" cy="8" r="1.5" fill="currentColor"/><path d="M8 1v2.5M8 12.5V15M1 8h2.5M12.5 8H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
    <input type="text" class="locator-input" placeholder="type or pick a selector…" value="#submit-btn" />
    <div class="controls-row">
      <select class="format-select">
        <option>CSS</option><option>XPath</option><option>PW</option><option>CY</option><option>SE</option>
      </select>
      <span class="match-pill">1</span>
      <span class="spacer"></span>
      <button class="copy-btn">Copy</button>
      </div>
    </div>
    <div class="actions-col">
      <button class="icon-btn" title="Open sidepanel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
      <button class="icon-btn" title="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <button class="icon-btn" title="Close">
        <svg viewBox="0 0 16 16" fill="none"><path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
</div>

</body>
</html>
